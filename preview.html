function Hero(){
  const [idx,setIdx]=useState(0);

  useEffect(()=>{
    const t=setInterval(()=>setIdx(p=>(p+1)%2),4200);
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    handleResize();
    window.addEventListener('resize', handleResize);
    return ()=>{
      clearInterval(t);
      window.removeEventListener('resize', handleResize);
    };
  },[]);

  return(
    <section className="min-h-[92vh] flex flex-col items-center justify-center text-center px-4 pt-20 pb-10 relative overflow-hidden dot-bg">

/* ──────────────────────────────────────────────────
   APP
────────────────────────────────────────────────── */
function App(){
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const handleLoad = () => {
      // Small timeout to allow heavy rendering to settle under the hood
      setTimeout(() => setLoading(false), 2400);
    };

    if (document.readyState === 'complete') {
      handleLoad();
    } else {
      window.addEventListener('load', handleLoad);
      return () => window.removeEventListener('load', handleLoad);
    }
  }, []);

  return(
    <div className="min-h-screen bg-[#FDFDFD]">
      <Preloader loading={loading}/>
      <Navbar/>
      <main>
        <Hero/>
        <Gateway/>
        <TrustedMarquee/>
        <TypoCards/>
        <AvatarCloud/>
        <Bento/>
        <Marketplace/>
        <ShowcaseHero/>
        <Testimonials/>
        <Pricing/>
        <NeonMarquee/>
        <FooterFeatures/>
      </main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
